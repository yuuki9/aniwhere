spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:25431}/${DB_NAME:aniwhere}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Trust X-Forwarded-* from reverse proxy (HTTPS host/scheme).
server:
  port: 8080
  forward-headers-strategy: framework

# If set, OpenAPI "Try it out" uses this base URL. Empty = same-origin for local dev.
app:
  api-public-url: ${APP_PUBLIC_URL:}
