spring:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 90MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Trust X-Forwarded-* from reverse proxy (HTTPS host/scheme).
server:
  port: 8080
  forward-headers-strategy: framework

