# Server only: runs when server/ (or this file) changes. Client CI/deploy: deploy-frontend.yml.
name: CI (server)

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"
  push:
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            server/build.gradle.kts
            server/settings.gradle.kts

      - name: Test
        run: chmod +x ./gradlew && ./gradlew test --no-daemon
