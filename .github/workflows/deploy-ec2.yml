# Server deploy: build image -> S3 -> EC2 (direct SSH; public IP or DNS).
# Compose: server/docker-compose.ec2.image.yml (image aniwhere-server:latest after docker load).
#
# GitHub Actions secrets (names must match):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, AWS_S3_BUCKET
#   EC2_HOST, EC2_USER, EC2_SSH_KEY   # EC2_HOST = public IPv4 or reachable hostname
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#   AWS_S3_SHOP_IMAGES_BUCKET  (상점 이미지 업로드 버킷 — 비우면 앱 기동 시 ShopImagesS3StartupValidator 가 실패함)
#   AWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL  (선택, CloudFront 등 퍼블릭 URL 접두사)
#   AWS_REGION 은 위 configure-aws 와 동일 secret 사용 권장(EC2 .env 에도 전달)
#   APP_AUTH_JWT_SECRET  (JWT HMAC 키 — 32자 이상 필수, 미설정 시 기본값 29자로 WeakKeyException)
#   APP_TOSS_CLIENT_ID, APP_TOSS_CLIENT_SECRET  (토스 로그인)
#   APP_TOSS_UNLINK_BASIC_AUTH  (선택, 연동 해제 Basic Auth)
#
# EC2 needs outbound HTTPS to S3 (presigned URL) — NAT, IGW, or VPC endpoint.
#
# Triggers: push main when server/** changes; workflow_dispatch.

name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-ec2.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            server/build.gradle.kts
            server/settings.gradle.kts

      - name: Test
        working-directory: server
        run: chmod +x ./gradlew && ./gradlew test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build image and upload to S3
        id: artifact
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          docker build -t aniwhere-server:latest server
          docker save aniwhere-server:latest -o /tmp/aniwhere-image.tar
          OBJECT_KEY="aniwhere/releases/${GITHUB_SHA}.tar"
          aws s3 cp /tmp/aniwhere-image.tar "s3://${BUCKET}/${OBJECT_KEY}" --region "${AWS_REGION}"
          PRESIGN=$(aws s3 presign "s3://${BUCKET}/${OBJECT_KEY}" --expires-in 900 --region "${AWS_REGION}")
          B64=$(printf '%s' "$PRESIGN" | base64 -w0)
          echo "presign_b64=$B64" >> "${GITHUB_OUTPUT}"

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "server/docker-compose.ec2.image.yml"
          target: "/home/${{ secrets.EC2_USER }}/aniwhere-server/"
          strip_components: 1
          timeout: 60s
          command_timeout: 10m

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          PRESIGN_B64: ${{ steps.artifact.outputs.presign_b64 }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_S3_SHOP_IMAGES_BUCKET: ${{ secrets.AWS_S3_SHOP_IMAGES_BUCKET }}
          AWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL: ${{ secrets.AWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL }}
          DEPLOY_AWS_REGION: ${{ secrets.AWS_REGION }}
          APP_AUTH_JWT_SECRET: ${{ secrets.APP_AUTH_JWT_SECRET }}
          APP_TOSS_CLIENT_ID: ${{ secrets.APP_TOSS_CLIENT_ID }}
          APP_TOSS_CLIENT_SECRET: ${{ secrets.APP_TOSS_CLIENT_SECRET }}
          APP_TOSS_UNLINK_BASIC_AUTH: ${{ secrets.APP_TOSS_UNLINK_BASIC_AUTH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: PRESIGN_B64,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,AWS_S3_SHOP_IMAGES_BUCKET,AWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL,DEPLOY_AWS_REGION,APP_AUTH_JWT_SECRET,APP_TOSS_CLIENT_ID,APP_TOSS_CLIENT_SECRET,APP_TOSS_UNLINK_BASIC_AUTH
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            REMOTE_DIR="/home/${{ secrets.EC2_USER }}/aniwhere-server"
            COMPOSE_FILE="$REMOTE_DIR/docker-compose.ec2.image.yml"
            NESTED_COMPOSE="$REMOTE_DIR/server/docker-compose.ec2.image.yml"
            cd "$REMOTE_DIR"
            if [ -f "$NESTED_COMPOSE" ]; then
              cp "$NESTED_COMPOSE" "$COMPOSE_FILE"
            fi
            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "compose file not found: $COMPOSE_FILE"
              exit 1
            fi
            if ! grep -q '/home/ubuntu/mtls:/home/ubuntu/mtls:ro' "$COMPOSE_FILE"; then
              echo "compose missing mTLS bind mount: $COMPOSE_FILE"
              exit 1
            fi
            if [ ! -f /home/ubuntu/mtls/aniwhere_public.crt ] || [ ! -f /home/ubuntu/mtls/aniwhere_private.key ]; then
              echo "host mTLS files missing under /home/ubuntu/mtls/"
              exit 1
            fi
            URL=$(printf '%s' "$PRESIGN_B64" | base64 -d)
            curl -fSL "$URL" -o /tmp/aniwhere-image.tar
            sudo docker load -i /tmp/aniwhere-image.tar
            rm -f /tmp/aniwhere-image.tar
            umask 077
            printf 'DB_HOST=%s\nDB_PORT=%s\nDB_NAME=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nAPP_PUBLIC_URL=%s\nAWS_S3_SHOP_IMAGES_BUCKET=%s\nAWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL=%s\nAWS_REGION=%s\nAPP_AUTH_JWT_SECRET=%s\nAPP_TOSS_CLIENT_ID=%s\nAPP_TOSS_CLIENT_SECRET=%s\nAPP_TOSS_UNLINK_BASIC_AUTH=%s\n' \
              "$DB_HOST" "$DB_PORT" "$DB_NAME" "$DB_USERNAME" "$DB_PASSWORD" \
              "https://api.aniwhere.link" \
              "${AWS_S3_SHOP_IMAGES_BUCKET:-}" "${AWS_S3_SHOP_IMAGES_PUBLIC_BASE_URL:-}" "${DEPLOY_AWS_REGION:-ap-northeast-2}" \
              "${APP_AUTH_JWT_SECRET:?APP_AUTH_JWT_SECRET is required (32+ chars)}" \
              "${APP_TOSS_CLIENT_ID:-}" "${APP_TOSS_CLIENT_SECRET:-}" "${APP_TOSS_UNLINK_BASIC_AUTH:-}" \
              > "$REMOTE_DIR/.env"
            chmod 600 "$REMOTE_DIR/.env" || true
            compose() {
              if sudo docker compose version >/dev/null 2>&1; then
                sudo docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                sudo docker-compose "$@"
              else
                echo "docker compose not found"
                exit 1
              fi
            }
            compose -f docker-compose.ec2.image.yml down 2>/dev/null || true
            compose -f docker-compose.ec2.image.yml up -d --force-recreate
            if ! sudo docker inspect aniwhere-server --format '{{range .Mounts}}{{if eq .Destination "/home/ubuntu/mtls"}}{{.Source}}{{end}}{{end}}' | grep -q '/home/ubuntu/mtls'; then
              echo "container missing /home/ubuntu/mtls bind mount"
              sudo docker inspect aniwhere-server --format '{{json .Mounts}}'
              exit 1
            fi
            sudo docker ps -a --filter name=aniwhere-server
