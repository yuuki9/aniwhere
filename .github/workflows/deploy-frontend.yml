# Frontend: verify on PR; deploy dist -> S3 + CloudFront invalidation on main.
# Secrets (align with server deploy where applicable):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   AWS_S3_FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
#
# Triggers: push main when client/** changes; workflow_dispatch; PR verifies only.

name: Deploy frontend

on:
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: client

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Apps in Toss (ait build) often emits dist/web/; sync that to bucket root so
      # CloudFront default root object (index.html) resolves without a /web/ prefix.
      - name: Sync to S3
        env:
          BUCKET: ${{ secrets.AWS_S3_FRONTEND_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          if [ -f ./dist/index.html ]; then
            SYNC_ROOT=./dist
          elif [ -f ./dist/web/index.html ]; then
            SYNC_ROOT=./dist/web
          else
            echo "Build output missing index.html under dist/ or dist/web/"
            ls -laR ./dist || true
            exit 1
          fi
          aws s3 sync "${SYNC_ROOT}" "s3://${BUCKET}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
