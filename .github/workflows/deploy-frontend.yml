# Frontend: verify on PR; deploy dist-static (vite) -> S3 root + CloudFront invalidation on main.
# Secrets (align with server deploy where applicable):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   AWS_S3_FRONTEND_BUCKET, CLOUDFRONT_DISTRIBUTION_ID
#   VITE_NAVER_MAP_NCP_KEY_ID
#
# Triggers: push main when client/** changes; workflow_dispatch; PR verifies only.

name: Deploy frontend

on:
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: client

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static (web deploy artifact)
        env:
          VITE_API_BASE_URL: https://api.aniwhere.link
          VITE_NAVER_MAP_NCP_KEY_ID: ${{ secrets.VITE_NAVER_MAP_NCP_KEY_ID }}
        run: npm run build:static

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build static (web deploy artifact)
        env:
          VITE_API_BASE_URL: https://api.aniwhere.link
          VITE_NAVER_MAP_NCP_KEY_ID: ${{ secrets.VITE_NAVER_MAP_NCP_KEY_ID }}
        run: npm run build:static

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        env:
          BUCKET: ${{ secrets.AWS_S3_FRONTEND_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          test -f ./dist-static/index.html
          aws s3 sync ./dist-static "s3://${BUCKET}/" --delete --region "${AWS_REGION}"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
